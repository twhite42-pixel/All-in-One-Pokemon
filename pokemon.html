<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Document</title>
    <meta name="description" content="pokemon app" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Card Slider</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   
</head>
<body>
 <div class="container">
<div class="container my-5">
    <h2 class="mb-4">All In One Pokemon</h2>

  

    <div class="d-flex justify-content-center">
        <div class="btn-group" role="group" aria-label="Basic outlined example">
            <button type="button" id="pokedex-btn" class="btn btn-outline-warning ps-5 pe-5 button">Pokedex</button>
            <button type="button" id="redesign-btn" class="btn btn-outline-warning ps-5 pe-5 button">Redesign Info</button>
            <button type="button" id="team-builder-btn" class="btn btn-outline-warning ps-5 pe-5 button">Team Builder</button>
            <button type="button" id="battle-btn" class="btn btn-outline-warning ps-5 pe-5 button">Battle</button>
            <button type="button" id="login-btn" class="btn btn-outline-dark ps-5 pe-5 button">Login</button>
        </div>
    </div>
</div>

      
<div class="d-flex justify-content-center text-center">
    <h1 class="welcome">Welcome!</h1>

       <img src="133.png"
      alt="Profile Picture">   
    </div>
   


<div class="container my-5 d-flex justify-content-center text-center">
  


    <div class="card-slider">

        <div class="card">
            
            <div class="card-body">
                <h5 class="card-title">Pokemon of the day</h5>
                <p class="card-text">Description of the pokemon of the day.</p>
                <a href="#" class="btn btn-primary">View</a>
            </div>
            <img src="https://picsum.photos/300/200?1" class="card-img-bottom" alt="">
        </div>

        <div class="card">
            
            <div class="card-body">
                <h5 class="card-title">Item of the day</h5>
                <p class="card-text">Description of the item of the day.</p>
                <a href="#" class="btn btn-primary">View</a>
            </div>
            <img src="https://picsum.photos/300/200?2" class="card-img-top" alt="">
        </div>

        <div class="card">
         
            <div class="card-body">
                <h5 class="card-title">Category of the day</h5>
                <p class="card-text">Description of the category of the day.</p>
                <a href="#" class="btn btn-primary">View</a>
            </div>
               <img src="https://picsum.photos/300/200?3" class="card-img-top" alt="">
        </div>

        
    </div>
</div>


</div>
    <script src="/script.js" defer></script>
  </body>
</html>
